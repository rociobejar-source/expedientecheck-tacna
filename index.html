<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpedienteCheck · Monitor de Obras MPT Tacna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ede6; --surface: #faf9f6; --header: #0f0f0f; --border: #e0ddd6;
      --text: #1a1a1a; --muted: #7a7570; --accent: #2a7d4f; --accent-lt: #e8f5ee;
      --rojo: #c0392b; --rojo-lt: #fdf0ee; --amarillo: #b7860b; --amarillo-lt: #fdf8e8;
      --verde: #2a7d4f; --verde-lt: #e8f5ee; --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }
    header { background: var(--header); height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
    .logo { color: #ffffff; font-weight: 700; font-size: 15px; }
    .header-right { display: flex; align-items: center; gap: 16px; color: #9ca3af; font-size: 13px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-role { display: inline-block; background: var(--accent-lt); color: var(--accent); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 3px; }
    .btn-logout, .btn-change-pwd, .btn-admin { background: transparent; border: 1px solid #4b5563; border-radius: 4px; color: #9ca3af; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover, .btn-change-pwd:hover, .btn-admin:hover { border-color: #fff; color: #fff; }
    main { padding: 28px 24px; max-width: 1300px; margin: 0 auto; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .page-title { font-size: 22px; font-weight: 700; }
    .page-title span { font-weight: 300; }
    .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .btn-actualizar { background: var(--header); border: none; border-radius: 8px; color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 9px 18px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: opacity 0.2s; }
    .btn-actualizar:hover { opacity: 0.8; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--header); border-color: var(--header); color: #fff; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead th { background: var(--header); color: #9ca3af; font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 11px 14px; text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: #f5f3ee; }
    tbody td { padding: 13px 14px; font-size: 13px; vertical-align: middle; }
    .obra-nombre { font-weight: 600; }
    .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
    .badge.rojo { background: var(--rojo-lt); color: var(--rojo); }
    .badge.amarillo { background: var(--amarillo-lt); color: var(--amarillo); }
    .badge.verde { background: var(--verde-lt); color: var(--verde); }
    .btn-detalle { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-detalle:hover { border-color: var(--accent); color: var(--accent); }
    .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: transparent; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .form-input, .form-textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: var(--sans); font-size: 14px; color: var(--text); background: white; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .btn-save, .btn-cancel { width: 100%; border: none; border-radius: 6px; padding: 11px 16px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn-save { background: var(--accent); color: white; }
    .btn-save:hover { opacity: 0.9; }
    .btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--header); color: white; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 200; animation: slideIn 0.3s ease; }
    .toast.error { background: var(--rojo); }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo">ExpedienteCheck</div>
    <div class="header-right">
      <div class="user-info" id="user-info" style="display:none;">
        <span id="user-email"></span>
        <span class="user-role" id="user-role"></span>
      </div>
      <button class="btn-admin" id="btn-admin" style="display:none;">Panel Admin</button>
      <button class="btn-change-pwd" id="btn-change-password" style="display:none;">Cambiar contraseña</button>
      <button class="btn-logout" id="btn-logout" style="display:none;">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div>
        <h1 class="page-title">Monitor <span>de Obras</span></h1>
        <p class="page-subtitle">Municipalidad Provincial de Tacna · 2026</p>
      </div>
      <button class="btn-actualizar" id="btn-actualizar">
        <span id="icon-actualizar">↻</span> Actualizar
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Total obras</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">PIM 2026</div>
        <div class="stat-value" id="stat-pim">—</div>
        <div class="stat-sub" id="stat-dev-pct">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Devengado 2026</div>
        <div class="stat-value" id="stat-devengado">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Obras en riesgo</div>
        <div class="stat-value rojo" id="stat-rojo">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Requieren atención</div>
        <div class="stat-value amarillo" id="stat-amarillo">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filtro="todas" id="f-todas">Todas (<span id="f-total">0</span>)</button>
      <button class="filter-btn" data-filtro="rojo" id="f-rojo">Riesgo alto (<span id="f-rojo-count">0</span>)</button>
      <button class="filter-btn" data-filtro="amarillo" id="f-amarillo">Atención (<span id="f-amarillo-count">0</span>)</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Obra</th>
            <th>CUI</th>
            <th>Costo</th>
            <th>Avance físico</th>
            <th>Avance financiero</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7"><div class="empty-state">Cargando obras...</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- MODAL: Detalle de obra -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <form id="form-obra" style="display:none;">
        <div class="form-group">
          <label class="form-label">Avance físico (%)</label>
          <input type="number" id="inp-fisico" class="form-input" min="0" max="100" step="0.1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Avance financiero (%)</label>
          <input type="number" id="inp-financiero" class="form-input" min="0" max="100" step="0.1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Situación actual</label>
          <textarea id="inp-situacion" class="form-textarea" placeholder="Describe la situación..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Punto crítico</label>
          <textarea id="inp-critico" class="form-textarea" placeholder="Menciona problemas..."></textarea>
        </div>
        <button type="submit" class="btn-save">Guardar registro</button>
        <button type="button" class="btn-cancel" id="btn-cancel">Cerrar</button>
      </form>
      <div id="detail-view" style="padding-top: 20px;"></div>
    </div>
  </div>

  <!-- MODAL: Cambiar contraseña -->
  <div class="overlay" id="overlay-password">
    <div class="modal">
      <button class="modal-close" id="modal-close-password">✕</button>
      <h2 class="modal-title">Cambiar contraseña</h2>
      <form id="form-password" style="margin-top: 20px;">
        <div class="form-group">
          <label class="form-label">Contraseña actual</label>
          <input type="password" id="inp-current-password" class="form-input" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" id="inp-new-password" class="form-input" placeholder="Mínimo 6 caracteres" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar nueva contraseña</label>
          <input type="password" id="inp-confirm-password" class="form-input" required/>
        </div>
        <button type="submit" class="btn-save">Cambiar contraseña</button>
        <button type="button" class="btn-cancel" id="btn-cancel-password">Cancelar</button>
      </form>
    </div>
  </div>

  <script>
    const API = 'https://api.expedientecheck.com';
    const token = localStorage.getItem('expediente_token');
    const userMeta = JSON.parse(localStorage.getItem('expediente_user') || '{}');
    
    let obras = [];
    let filtro = 'todas';
    let obraActual = null;
    let puedeEditar = !!token;

    // Si hay usuario logueado, mostrar info
    if (token && userMeta.id) {
      document.getElementById('user-email').textContent = userMeta.email;
      document.getElementById('user-role').textContent = userMeta.rol;
      document.getElementById('user-info').style.display = 'flex';
      document.getElementById('btn-change-password').style.display = 'block';
      document.getElementById('btn-logout').style.display = 'block';

      if (userMeta.rol === 'admin') {
        document.getElementById('btn-admin').style.display = 'block';
        document.getElementById('btn-admin').addEventListener('click', () => {
          window.location.href = 'admin.html';
        });
      }
    } else {
      // Usuario público
      document.getElementById('btn-actualizar').style.display = 'block';
    }

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('expediente_token');
      localStorage.removeItem('expediente_user');
      window.location.href = 'login.html';
    });

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtro = btn.dataset.filtro;
        renderTabla();
      });
    });

    // Cargar obras
    async function cargarObras() {
      document.getElementById('btn-actualizar').disabled = true;
      document.getElementById('icon-actualizar').classList.add('spin');

      try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch(`${API}/api/obras`, { headers });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al cargar');

        obras = data.obras || [];
        renderStats();
        renderFiltros();
        renderTabla();
      } catch(err) {
        toast(err.message || 'Error al cargar obras', 'error');
      } finally {
        document.getElementById('btn-actualizar').disabled = false;
        document.getElementById('icon-actualizar').classList.remove('spin');
      }
    }

    function fmtM(n) {
      if (!n) return '—';
      return 'S/ ' + Number(n).toLocaleString('es-PE', { maximumFractionDigits: 0 });
    }

    function renderStats() {
      const totalPim = obras.reduce((s,o)=> s+(o.pim_2026||0), 0);
      const totalDev = obras.reduce((s,o)=> s+(o.devengado_2026||0), 0);
      const rojas = obras.filter(o => o.alerta==='rojo').length;
      const amarillas = obras.filter(o => o.alerta==='amarillo').length;
      const pct = totalPim > 0 ? ((totalDev/totalPim)*100).toFixed(1) : '—';

      document.getElementById('stat-total').textContent = obras.length;
      document.getElementById('stat-pim').textContent = fmtM(totalPim);
      document.getElementById('stat-devengado').textContent = fmtM(totalDev);
      document.getElementById('stat-rojo').textContent = rojas;
      document.getElementById('stat-amarillo').textContent = amarillas;
      document.getElementById('stat-dev-pct').textContent = `${pct}% del PIM 2026`;
    }

    function renderFiltros() {
      document.getElementById('f-total').textContent = obras.length;
      document.getElementById('f-rojo-count').textContent = obras.filter(o=>o.alerta==='rojo').length;
      document.getElementById('f-amarillo-count').textContent = obras.filter(o=>o.alerta==='amarillo').length;
    }

    function renderTabla() {
      const tbody = document.getElementById('tbody');
      let filtradas = filtro === 'todas' ? obras
        : filtro === 'amarillo' ? obras.filter(o=>o.alerta==='amarillo')
        : obras.filter(o=>o.alerta===filtro);

      if (!filtradas.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">Sin obras para mostrar</div></td></tr>`;
        return;
      }

      filtradas = [...filtradas].sort((a,b) => {
        const ord = {rojo:0,amarillo:1,verde:2};
        return (ord[a.alerta]??2) - (ord[b.alerta]??2);
      });

      tbody.innerHTML = filtradas.map(o => {
        const alerta = o.alerta || 'verde';
        const badge = alerta==='rojo' ? '<span class="badge rojo">Riesgo alto</span>'
          : alerta==='amarillo' ? '<span class="badge amarillo">Atención</span>'
          : '<span class="badge verde">Sin alertas</span>';

        return `
        <tr>
          <td class="obra-nombre">${o.nombre || 'Sin nombre'}</td>
          <td>${o.cui}</td>
          <td>${fmtM(o.costo_proyecto)}</td>
          <td>${o.avance_fisico ? o.avance_fisico.toFixed(1) + '%' : '—'}</td>
          <td>${o.avance_financiero ? o.avance_financiero.toFixed(1) + '%' : '—'}</td>
          <td>${badge}</td>
          <td>
            <button class="btn-detalle" data-id="${o.id}">
              ${puedeEditar ? 'Ver / Editar' : 'Ver detalle'}
            </button>
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('.btn-detalle').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = parseInt(btn.dataset.id);
          abrirModal(obras.find(o=>o.id===id));
        });
      });
    }

    function abrirModal(obra) {
      obraActual = obra;
      document.getElementById('modal-title').textContent = obra.nombre || 'Sin nombre';
      
      if (puedeEditar) {
        document.getElementById('form-obra').style.display = 'block';
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('inp-fisico').value = obra.avance_fisico || 0;
        document.getElementById('inp-financiero').value = obra.avance_financiero || 0;
        document.getElementById('inp-situacion').value = obra.situacion || '';
        document.getElementById('inp-critico').value = obra.punto_critico || '';
      } else {
        document.getElementById('form-obra').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
        document.getElementById('detail-view').innerHTML = `
          <p><strong>CUI:</strong> ${obra.cui}</p>
          <p><strong>Costo:</strong> ${fmtM(obra.costo_proyecto)}</p>
          <p><strong>Avance físico:</strong> ${obra.avance_fisico ? obra.avance_fisico.toFixed(1) + '%' : '—'}</p>
          <p><strong>Avance financiero:</strong> ${obra.avance_financiero ? obra.avance_financiero.toFixed(1) + '%' : '—'}</p>
          <p><strong>Situación:</strong> ${obra.situacion || '—'}</p>
          <p><strong>Punto crítico:</strong> ${obra.punto_critico || '—'}</p>
          <p style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px;">
            Para editar, debes <a href="login.html" style="color: var(--accent);">iniciar sesión</a>
          </p>
        `;
      }

      document.getElementById('overlay').classList.add('open');
    }

    function cerrarModal() {
      document.getElementById('overlay').classList.remove('open');
      obraActual = null;
    }

    document.getElementById('modal-close').addEventListener('click', cerrarModal);
    document.getElementById('btn-cancel').addEventListener('click', cerrarModal);
    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('overlay')) cerrarModal();
    });

    document.getElementById('form-obra').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!obraActual || !token) return;
      
      const btn = document.querySelector('#form-obra .btn-save');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        const res = await fetch(`${API}/api/obras/${obraActual.id}/avance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            avance_fisico: parseFloat(document.getElementById('inp-fisico').value),
            avance_financiero: parseFloat(document.getElementById('inp-financiero').value),
            situacion: document.getElementById('inp-situacion').value,
            punto_critico: document.getElementById('inp-critico').value
          })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        const idx = obras.findIndex(o=>o.id===obraActual.id);
        if (idx !== -1) obras[idx].alerta = data.alerta;
        renderStats();
        renderFiltros();
        renderTabla();
        cerrarModal();
        toast('Registro guardado correctamente');
      } catch(err) {
        toast(err.message || 'Error al guardar', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar registro';
      }
    });

    // Cambiar contraseña
    document.getElementById('btn-change-password').addEventListener('click', () => {
      document.getElementById('overlay-password').classList.add('open');
    });

    document.getElementById('modal-close-password').addEventListener('click', () => {
      document.getElementById('overlay-password').classList.remove('open');
    });

    document.getElementById('btn-cancel-password').addEventListener('click', () => {
      document.getElementById('overlay-password').classList.remove('open');
    });

    document.getElementById('form-password').addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('inp-current-password').value;
      const newPwd = document.getElementById('inp-new-password').value;
      const confirm = document.getElementById('inp-confirm-password').value;

      if (newPwd !== confirm) {
        toast('Las contraseñas no coinciden', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/api/auth/change-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ current_password: current, new_password: newPwd })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        toast('Contraseña actualizada correctamente');
        document.getElementById('overlay-password').classList.remove('open');
      } catch(err) {
        toast(err.message, 'error');
      }
    });

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // Inicializar
    document.getElementById('btn-actualizar').addEventListener('click', cargarObras);
    cargarObras();
    setInterval(cargarObras, 5 * 60 * 1000);
  </script>
</body>
</html>
