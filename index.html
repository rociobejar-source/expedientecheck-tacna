<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpedienteCheck · Monitor de Obras MPT Tacna</title>
  <style>
    :root { --bg: #f0ede6; --surface: #faf9f6; --header: #0f0f0f; --border: #e0ddd6; --text: #1a1a1a; --muted: #7a7570; --accent: #2a7d4f; --accent-lt: #e8f5ee; --rojo: #c0392b; --rojo-lt: #fdf0ee; --amarillo: #b7860b; --amarillo-lt: #fdf8e8; --verde: #2a7d4f; --verde-lt: #e8f5ee; --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }
    header { background: var(--header); height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
    .logo { color: #ffffff; font-weight: 700; font-size: 15px; }
    main { padding: 28px 24px; max-width: 1300px; margin: 0 auto; }
  </style>
</head>
<body>
<header>
  <span class="logo">ExpedienteCheck</span>
</header>
<main>
  <h1>Cargando datos...</h1>
  <p id="status">Conectando con el servidor...</p>
</main>
<script>
  const API = 'https://api.expedientecheck.com';
  async function cargar() {
    try {
      const res = await fetch(`${API}/api/obras`);
      const data = await res.json();
      document.getElementById('status').textContent = `✓ ${data.obras?.length || 0} obras cargadas`;
    } catch(err) {
      document.getElementById('status').textContent = `✗ Error: ${err.message}`;
    }
  }
  cargar();
</script>
</body>
</html>
