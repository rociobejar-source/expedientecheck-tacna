<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExpedienteCheck · Ingresar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f0ede6;
      --surface:   #faf9f6;
      --header:    #0f0f0f;
      --border:    #e0ddd6;
      --text:      #1a1a1a;
      --muted:     #7a7570;
      --accent:    #2a7d4f;
      --accent-lt: #e8f5ee;
      --rojo:      #c0392b;
      --rojo-lt:   #fdf0ee;
      --sans:      'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .login-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--header);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lt);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .btn-login {
      width: 100%;
      background: var(--header);
      border: none;
      border-radius: 6px;
      color: white;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      padding: 11px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .btn-login:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      background: var(--rojo-lt);
      border: 1px solid #f5c6c2;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--rojo);
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .help-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    .help-text strong {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">ExpedienteCheck</div>
    <h1 class="login-title">Ingresar</h1>
    <p class="login-subtitle">Monitor de Obras</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-login" id="btn-submit">
        Ingresar
      </button>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:8px;color:var(--muted);font-size:12px;">Verificando credenciales...</p>
    </div>

    <div class="help-text">
      <strong>Para acceder:</strong> Usa el email y contraseña que te proporcionó el Administrador.
    </div>
  </div>

  <script>
    const API = 'https://api.expedientecheck.com';

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnSubmit = document.getElementById('btn-submit');
    const errorMsg = document.getElementById('error-msg');
    const loading = document.getElementById('loading');

    // Obtener parámetro cui de la URL si existe
    const urlParams = new URLSearchParams(window.location.search);
    const cuiParam = urlParams.get('cui');

    // Si ya está logueado, redirige al dashboard
    if (localStorage.getItem('expediente_token')) {
      // Si viene con cui, va a la ficha; si no, va al index
      const redirectUrl = cuiParam ? `fichatecnicaCUI.html?cui=${cuiParam}` : 'index.html';
      window.location.href = redirectUrl;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Email y contraseña requeridos');
        return;
      }

      btnSubmit.disabled = true;
      loading.style.display = 'block';
      form.style.display = 'none';
      errorMsg.classList.remove('show');

      try {
        const response = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Error al ingresar');
        }

        // Guardar token y datos del usuario
        localStorage.setItem('expediente_token', data.access_token);
        localStorage.setItem('expediente_refresh_token', data.refresh_token);
        localStorage.setItem('expediente_user', JSON.stringify(data.user));

        // Redirigir: si viene con cui, va a la ficha; si no, va al dashboard
        const redirectUrl = cuiParam ? `fichatecnicaCUI.html?cui=${cuiParam}` : 'index.html';
        window.location.href = redirectUrl;
      } catch (err) {
        showError(err.message);
        btnSubmit.disabled = false;
        loading.style.display = 'none';
        form.style.display = 'block';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
